name: Deploy

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm

    - name: Create .env.local
      run: |
        cat > .env.local << 'ENV'
        VITE_FIREBASE_API_KEY=AIzaSyDummyKeyForBuild123456789
        VITE_FIREBASE_AUTH_DOMAIN=forja-voxel.firebaseapp.com
        VITE_FIREBASE_PROJECT_ID=forja-voxel
        VITE_FIREBASE_STORAGE_BUCKET=forja-voxel.firebasestorage.app
        VITE_FIREBASE_MESSAGING_SENDER_ID=569671313567
        VITE_FIREBASE_APP_ID=1:569671313567:web:a028e2c45e13baee8c1aaa
        VITE_FIREBASE_MEASUREMENT_ID=G-M71PJYRMPN
        ENV

    - run: npm ci
    - run: npm run build

    - uses: peaceiris/actions-gh-pages@v4
      if: github.ref == 'refs/heads/master'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist
